# ============================================================================
# KutSocial - Nginx Configuration for Local Server (HTTP Only / No SSL)
# ============================================================================
# Place this configuration on your local server running PHP 8.3-FPM.

server {
    listen 80;
    server_name ernestoacosta.org; # Replace with your local host or local IP

    root /var/www/html/kutsocial; # Replace with your absolute path
    index index.php;

    charset utf-8;
    # client_max_body_size 1024M;

    # ========================================================================
    # Restauración de IPs Reales tras el túnel WireGuard
    # ========================================================================
    set_real_ip_from 10.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;


    # Allow access to uploaded media
    location ^~ /data/uploads/ {
        # Serve static uploads directly
    }

    # Protect internal folders and backups
    location ~ ^/(data|src)/ {
        deny all;
        return 404;
    }

    # Enable clean URLs and direct all requests to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Handle PHP Scripts
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # PHP 8.3 FPM socket (Adjust to match your OS socket path)
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;

        # Disable buffering specifically for SSE (Server-Sent Events)
        # to ensure real-time toot delivery without latency
        fastcgi_buffering off;
        gzip off;

        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
    }

    # Static Assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    # Logs
    error_log  /var/log/nginx/kutsocial_local_error.log;
    access_log /var/log/nginx/kutsocial_local_access.log;
}
