# ============================================================================
# KutSocial - Nginx Configuration for Public Reverse Proxy Server (HTTPS / SSL)
# ============================================================================
# Place this configuration on your public-facing VPS/Server acting as a proxy.
# It forwards all traffic over the VPN to your local instance IP (e.g., 10.8.0.2).

# HTTP Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kutsocial.tudominio.com; # Replace with your public domain

    return 301 https://$host$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kutsocial.tudominio.com; # Replace with your public domain

    # SSL Certificates (Configure with Let's Encrypt / Certbot path)
    ssl_certificate /etc/letsencrypt/live/kutsocial.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kutsocial.tudominio.com/privkey.pem;

    # Secure SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Maximum file upload size (needed for avatars and attachments)
    client_max_body_size 40M;

    # Proxy all traffic to the local server over VPN
    location / {
        # Replace 10.8.0.2 with the VPN IP address of your local server
        proxy_pass http://10.8.0.2; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Configuration for real-time streaming endpoint (SSE Server-Sent Events)
    location /api/v1/streaming {
        # Replace 10.8.0.2 with the VPN IP address of your local server
        proxy_pass http://10.8.0.2;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRITICAL for SSE: Disable proxy buffering to prevent Nginx from caching 
        # the stream chunk responses, ensuring instant toot delivery.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Keep the stream connection open for a long time
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Logs
    error_log  /var/log/nginx/kutsocial_proxy_error.log;
    access_log /var/log/nginx/kutsocial_proxy_access.log;
}
